<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Research Copilot v3</title>

<style>
  body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:#e5e7eb;
    padding:30px;
  }

  .container{max-width:900px;margin:auto;}

  h1{font-size:22px;margin-bottom:6px}
  p{color:#9ca3af;margin-top:0}

  .card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
  }

  input,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #1f2937;
    background:#0f172a;
    color:#e5e7eb;
  }

  button{
    margin-top:14px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-weight:600;
    cursor:pointer;
  }

  button:hover{background:#2563eb}

  .output{
    white-space:pre-wrap;
    background:#0f172a;
    padding:16px;
    border-radius:10px;
    margin-top:16px;
    border:1px solid #1f2937;
  }

  .row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  @media(max-width:700px){
    .row{grid-template-columns:1fr}
  }
</style>
</head>

<body>

<div class="container">

  <h1>Research Copilot v3</h1>
  <p>Decision-grade research system with analysis + ROI thinking</p>

  <div class="card">

    <input id="topic" placeholder="Enter research topic...">

    <div class="row">
      <select id="depth">
        <option value="basic">Basic</option>
        <option value="standard" selected>Standard</option>
        <option value="deep">Deep Analysis</option>
      </select>

      <select id="mode">
        <option value="business">Business Impact</option>
        <option value="productivity">Productivity</option>
        <option value="market">Market Analysis</option>
      </select>
    </div>

    <button onclick="generate()">Generate Research System</button>

    <div id="out" class="output" style="display:none;"></div>

    <button id="copyBtn" style="display:none;background:#22c55e" onclick="copy()">
      Copy Full System
    </button>

  </div>

</div>

<script>

let last = "";

function generate(){

  const topic = document.getElementById('topic').value.trim();
  const depth = document.getElementById('depth').value;
  const mode = document.getElementById('mode').value;

  if(!topic){
    alert("Enter topic");
    return;
  }

  const config = {
    basic: 3,
    standard: 5,
    deep: 7
  };

  const steps = config[depth];

  const system = buildSystem(topic, steps, mode);

  last = system;

  const out = document.getElementById('out');
  out.style.display = "block";
  out.textContent = system;

  document.getElementById('copyBtn').style.display = "block";
}

function buildSystem(topic, steps, mode){

  const questions = [
    `What specific real-world use cases exist for ${topic}?`,
    `What measurable impact does ${topic} create in real businesses?`,
    `What are the highest ROI applications of ${topic}?`,
    `Where does ${topic} fail or underperform?`
  ];

  const plans = [
    "Map real-world implementations (not theory)",
    "Identify measurable performance metrics",
    "Compare traditional vs AI-driven workflows",
    "Analyze cost vs ROI structure",
    "Identify adoption barriers",
    "Extract actionable insights"
  ].slice(0, steps);

  const prompts = [
    `Break down real workflows of ${topic} and identify automation opportunities`,
    `Analyze ROI impact of ${topic} in small business environments`,
    `Compare efficiency before vs after ${topic} adoption`,
    `Identify hidden costs and limitations of ${topic}`,
    `Generate decision framework: should a business adopt ${topic}?`
  ];

  const outputFramework = `
DECISION INTELLIGENCE OUTPUT:

1. Market Reality Map
   - real usage (not theory)

2. Workflow Transformation Analysis
   - before vs after structure

3. ROI Breakdown
   - time, cost, output

4. Adoption Strategy
   - when to use / when NOT to use

5. Risk Analysis
   - failure points + hidden costs

6. Final Decision Guide
   - adopt / avoid / partial use
`;

  const modeNote = {
    business: "Focus: business ROI + cost efficiency",
    productivity: "Focus: workflow speed + time savings",
    market: "Focus: adoption trends + competition"
  };

  return `
==============================
RESEARCH COPILOT v3
==============================

TOPIC:
${topic}

MODE:
${modeNote[mode]}

------------------------------
HIGH VALUE QUESTIONS
------------------------------
${questions.map(q=>"• "+q).join("\n")}

------------------------------
EXECUTION PLAN
------------------------------
${plans.map(p=>"• "+p).join("\n")}

------------------------------
AI EXECUTION PROMPTS
------------------------------
${prompts.map(p=>"• "+p).join("\n")}

------------------------------
OUTPUT FRAMEWORK
------------------------------
${outputFramework}

------------------------------
CRITICAL RULES
------------------------------
- No generic explanations
- Focus on real-world data
- Prioritize measurable impact
- Avoid marketing language

------------------------------
FINAL OUTPUT TYPE:
Decision-grade research system
`;
}

function copy(){
  if(!last) return;
  navigator.clipboard.writeText(last)
    .then(()=> alert("Copied"))
    .catch(()=> alert("Failed"));
}

</script>

</body>
</html>
