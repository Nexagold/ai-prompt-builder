<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Research Prompt Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#0b1220;
    color:#e5e7eb;
    padding:30px;
  }

  .container{
    max-width:900px;
    margin:auto;
  }

  h1{
    font-size:22px;
    margin-bottom:6px;
  }

  p{
    color:#9ca3af;
    margin-top:0;
  }

  .card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
  }

  label{
    display:block;
    margin-top:12px;
    font-size:13px;
    color:#cbd5e1;
  }

  input, select{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #1f2937;
    background:#0f172a;
    color:#e5e7eb;
  }

  button{
    margin-top:16px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-weight:600;
    cursor:pointer;
  }

  button:hover{
    background:#2563eb;
  }

  .output{
    white-space:pre-wrap;
    background:#0f172a;
    padding:16px;
    border-radius:10px;
    margin-top:16px;
    border:1px solid #1f2937;
  }

  .small{
    font-size:12px;
    color:#6b7280;
    margin-top:6px;
  }
</style>
</head>

<body>

<div class="container">

  <h1>Research Prompt Generator</h1>
  <p>Turn any idea into structured research plan + AI prompts</p>

  <div class="card">

    <label>Research Topic</label>
    <input id="topic" placeholder="e.g. AI tools for startups, competitor analysis, market trend...">

    <label>Output Depth</label>
    <select id="depth">
      <option value="simple">Simple</option>
      <option value="standard" selected>Standard</option>
      <option value="deep">Deep Research</option>
    </select>

    <button onclick="generate()">Generate Research System</button>

    <div id="out" class="output" style="display:none;"></div>

  </div>
</div>

<script>

function generate(){

  const topic = document.getElementById('topic').value.trim();
  const depth = document.getElementById('depth').value;

  if(!topic){
    alert("Enter a research topic");
    return;
  }

  let complexity = "";

  if(depth === "simple"){
    complexity = "basic structured overview";
  } else if(depth === "standard"){
    complexity = "structured research plan with actionable steps";
  } else {
    complexity = "deep multi-layer research system with analysis, risks, and insights";
  }

  const output = `
You are a senior research analyst AI.

TOPIC:
${topic}

TASK:
Create a ${complexity}.

OUTPUT STRUCTURE:

1. Key research questions
2. What data should be collected
3. Step-by-step research plan
4. AI prompts for execution
5. Expected final insights
6. Potential risks or blind spots

RULES:
- Be structured
- Be actionable
- Avoid vague explanations
- Focus on real-world usability

---

DELIVERABLE:
A complete research system ready for execution.
`;

  const out = document.getElementById('out');
  out.style.display = "block";
  out.textContent = output;
}

</script>

</body>
</html>
