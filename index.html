<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Research Prompt System</title>

<style>
  body{
    margin:0;
    font-family:system-ui, sans-serif;
    background:#0b1220;
    color:#e5e7eb;
    padding:30px;
  }

  .container{
    max-width:900px;
    margin:auto;
  }

  h1{
    font-size:22px;
    margin-bottom:6px;
  }

  p{
    color:#9ca3af;
    margin-top:0;
  }

  .card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
  }

  input, select{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #1f2937;
    background:#0f172a;
    color:#e5e7eb;
  }

  button{
    margin-top:14px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-weight:600;
    cursor:pointer;
  }

  button:hover{
    background:#2563eb;
  }

  .output{
    white-space:pre-wrap;
    background:#0f172a;
    padding:16px;
    border-radius:10px;
    margin-top:16px;
    border:1px solid #1f2937;
  }

  .copy-btn{
    margin-top:10px;
    background:#22c55e;
  }
</style>
</head>

<body>

<div class="container">

  <h1>Research Prompt System</h1>
  <p>Turn any idea into structured research + execution prompts</p>

  <div class="card">

    <input id="topic" placeholder="Enter your research topic...">

    <select id="depth">
      <option value="simple">Simple</option>
      <option value="standard" selected>Standard</option>
      <option value="deep">Deep Research</option>
    </select>

    <button onclick="generate()">Generate System</button>

    <div id="out" class="output" style="display:none;"></div>

    <button id="copyBtn" class="copy-btn" style="display:none;" onclick="copyOutput()">
      Copy Output
    </button>

  </div>

</div>

<script>

let lastOutput = "";

function generate(){

  const topic = document.getElementById('topic').value.trim();
  const depth = document.getElementById('depth').value;

  if(!topic){
    alert("Enter a topic");
    return;
  }

  const levels = {
    simple: 3,
    standard: 5,
    deep: 7
  };

  const steps = levels[depth];

  const output = buildSystem(topic, steps);

  lastOutput = output;

  const out = document.getElementById('out');
  out.style.display = "block";
  out.textContent = output;

  document.getElementById('copyBtn').style.display = "block";
}

function buildSystem(topic, steps){

  const questions = [
    `What are the main trends in ${topic}?`,
    `Who are the key players in ${topic}?`,
    `What real-world impact does ${topic} have?`,
    `What are the limitations of ${topic}?`
  ];

  const planBase = [
    "Market overview analysis",
    "Real-world case studies",
    "Data extraction & comparison",
    "Insight generation",
    "Final conclusions"
  ];

  const prompts = [
    `Analyze real-world use cases of ${topic} and extract measurable results`,
    `Compare traditional vs modern approaches in ${topic}`,
    `Identify ROI and productivity impact of ${topic}`,
    `Find adoption barriers and risks in ${topic}`
  ];

  const plan = planBase.slice(0, steps);

  return `
==============================
RESEARCH SYSTEM
==============================

TOPIC:
${topic}

------------------------------
KEY RESEARCH QUESTIONS
------------------------------
${questions.map(q=>"• "+q).join("\n")}

------------------------------
RESEARCH PLAN
------------------------------
${plan.map(p=>"• "+p).join("\n")}

------------------------------
AI EXECUTION PROMPTS
------------------------------
${prompts.map(p=>"• "+p).join("\n")}

------------------------------
OUTPUT BLUEPRINT
------------------------------
1. Market landscape
2. Real case studies
3. Key insights
4. Opportunities
5. Risks & limitations

------------------------------
FINAL NOTE
------------------------------
This system is ready for execution.
`;
}

function copyOutput(){

  if(!lastOutput) return;

  navigator.clipboard.writeText(lastOutput)
    .then(()=> alert("Copied to clipboard"))
    .catch(()=> alert("Copy failed"));
}

</script>

</body>
</html>
